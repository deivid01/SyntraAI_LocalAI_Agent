<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jarvis AI — Local Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/global.css" />
  <link rel="stylesheet" href="styles/hud.css" />
  <link rel="stylesheet" href="styles/animations.css" />
</head>
<body>

  <!-- Title Bar (frameless window drag region) -->
  <div id="titlebar">
    <div id="titlebar-drag">
      <span class="title-logo">◈</span>
      <span class="title-text">JARVIS AI — LOCAL INTELLIGENCE SYSTEM</span>
    </div>
    <div id="titlebar-controls">
      <button id="btn-minimize" class="title-btn" title="Minimizar">⎯</button>
      <button id="btn-maximize" class="title-btn" title="Maximizar">□</button>
      <button id="btn-close" class="title-btn close" title="Fechar">✕</button>
    </div>
  </div>

  <!-- Main Layout -->
  <div id="app">

    <!-- Left Panel: Logs & History -->
    <aside id="log-panel">
      <div class="panel-header">
        <span class="panel-icon">◫</span>
        <span>SYSTEM LOGS</span>
      </div>
      <div id="log-entries"></div>
      <div class="panel-footer">
        <button id="btn-clear-history" class="hud-btn small">LIMPAR</button>
      </div>
    </aside>

    <!-- Center: HUD -->
    <main id="hud-center">

      <!-- Status Bar -->
      <div id="status-bar">
        <div id="status-indicator">
          <span id="status-dot"></span>
          <span id="status-label">INICIALIZANDO</span>
        </div>
        <div id="dep-status">
          <span id="dep-ollama" class="dep-badge offline" title="Ollama LLM">LLM</span>
          <span id="dep-whisper" class="dep-badge offline" title="Whisper STT">STT</span>
        </div>
      </div>

      <!-- Main HUD Circle -->
      <div id="hud-circle-wrapper">
        <canvas id="hud-canvas" width="420" height="420"></canvas>
        <div id="hud-center-text">
          <div id="jarvis-eye"></div>
          <div id="hud-brand">JARVIS</div>
          <div id="hud-version">v1.0 LOCAL</div>
        </div>
      </div>

      <!-- Transcript & Response -->
      <div id="conversation-area">
        <div id="transcript-box">
          <span class="conv-label">▶ VOCÊ</span>
          <p id="transcript-text" class="conv-text">&nbsp;</p>
        </div>
        <div id="response-box">
          <span class="conv-label">◈ JARVIS</span>
          <p id="response-text" class="conv-text typing">&nbsp;</p>
        </div>
      </div>

      <!-- Text Input (manual) -->
      <div id="text-input-area">
        <input
          id="text-input"
          type="text"
          placeholder="Digite um comando ou fale 'Jarvis'..."
          autocomplete="off"
        />
        <button id="btn-send" class="hud-btn">ENVIAR</button>
      </div>

    </main>

    <!-- Right Panel: Info -->
    <aside id="info-panel">
      <div class="panel-header">
        <span class="panel-icon">◉</span>
        <span>SYSTEM STATUS</span>
      </div>
      <div class="info-section">
        <div class="info-label">MODO</div>
        <div class="info-value" id="info-mode">STANDBY</div>
      </div>
      <div class="info-section">
        <div class="info-label">AMPLITUDE</div>
        <div class="info-value" id="info-amplitude">0.000</div>
        <div id="amplitude-bar-wrapper">
          <div id="amplitude-bar"></div>
        </div>
      </div>
      <div class="info-section">
        <div class="info-label">ÚLTIMOS COMANDOS</div>
        <ul id="recent-commands"></ul>
      </div>
      <div class="info-section">
        <div class="info-label">ATIVAÇÃO</div>
        <div class="info-value small">Diga <span class="highlight">"Jarvis"</span></div>
        <div class="info-value small">ou dê uma <span class="highlight">palma</span></div>
      </div>
    </aside>

  </div>

  <!-- Waveform -->
  <div id="waveform-container">
    <canvas id="waveform-canvas"></canvas>
  </div>

  <!-- Web Speech TTS fallback (hidden) -->
  <div id="tts-hidden" style="display:none"></div>

  <!-- Polyfill for CommonJS compilation in browser -->
  <script>
    var exports = {};
    var module = { exports: exports };
  </script>

  <!-- Scripts (compiled from TS) -->
  <script src="../../dist/renderer/components/HudCircle.js"></script>
  <script src="../../dist/renderer/components/Waveform.js"></script>
  <script src="../../dist/renderer/components/StatusIndicator.js"></script>
  <script src="../../dist/renderer/components/TypingText.js"></script>
  <script src="../../dist/renderer/components/AudioCapture.js"></script>
  <script src="../../dist/renderer/scripts/visualizer.js"></script>
  <script src="../../dist/renderer/scripts/uiController.js"></script>
</body>
</html>
